sonar.projectKey=DumpThebnut
sonar.projectName=dump.thebnut
sonar.host.url=http://localhost:9000
sonar.sourceEncoding=UTF-8

# Sources: Next.js app under src/ (no root-level Next convention files)
sonar.sources=src

# Tests: no test runner installed, but keep inclusion patterns for the future
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/.next/**,**/.turbo/**,**/dist/**,**/build/**,**/coverage/**,**/*.min.js,**/.scannerwork/**,**/*.tsbuildinfo,public/**,drizzle/**,scripts/**

# Don't penalise infra files for missing coverage
sonar.coverage.exclusions=**/*.config.ts,**/*.config.mjs,**/*.config.js,scripts/**,drizzle/**,src/proxy.ts,src/middleware.ts,src/app/icon.svg,next.config.ts

# TypeScript
sonar.typescript.tsconfigPaths=tsconfig.json
